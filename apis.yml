apis:
  - aid: discourse:discourse-api
    name: Discourse API
    description: >-
      The Discourse API exposes the full set of REST endpoints used to manage
      a Discourse forum, including categories, topics, posts, users, groups,
      tags, badges, uploads, search, site settings, and admin operations.
      Authentication uses an API Key plus an Api-Username header issued from
      the Discourse admin panel.
    humanURL: https://www.discourse.org/
    baseURL: https://meta.discourse.org
    tags:
