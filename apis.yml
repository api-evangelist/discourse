apis:
  - aid: discourse:discourse-api
    name: Discourse API
    description: >-
      The Discourse API exposes the full set of REST endpoints used to manage a Discourse forum, including categories,
      topics, posts, users, groups, tags, badges, uploads, search, site settings, and admin operations. Authentication
      uses an API Key plus an Api-Username header issued from the Discourse admin panel.
    humanURL: https://www.discourse.org/
    baseURL: https://meta.discourse.org
    tags:
      - Categories
      - Forums
      - Groups
      - Posts
      - Tags
      - Topics
      - Users
    properties:
      - type: Documentation
        url: https://docs.discourse.org/
      - type: OpenAPI
        url: openapi/discourse-openapi.json
      - type: GitHubRepo
        url: https://github.com/discourse/discourse_api
    contact:
      - FN: Discourse Support
        url: https://meta.discourse.org/t/what-is-discourse-api/166416
