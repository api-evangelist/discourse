aid: discourse
name: Discourse
description: >-
  At Discourse, our mission is to democratize online community and teamwork by
  raising the standard of civilized discourse on the Internet. We achieve this
  through delivering the best community and forum software. The Discourse API
  exposes administrative and content endpoints for categories, topics, posts,
  users, groups, tags, uploads, badges, and more.
