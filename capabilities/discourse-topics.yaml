          required: true
        - name: Api-Username
          in: header
          type: string
          required: true
        - name: order
          in: query
          type: string
          description: 'Enum: `default`, `created`, `activity`, `views`, `posts`, `category`,'
        - name: ascending
          in: query
          type: string
          description: Defaults to `desc`, add `ascending=true` to sort asc
        - name: per_page
          in: query
          type: integer
          description: Maximum number of topics returned, between 1-100
