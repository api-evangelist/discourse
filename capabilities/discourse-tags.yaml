          in: path
          type: string
          required: true
      - name: updatetaggroup
        method: PUT
        description: Update tag group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: tags.json
      path: /tags.json
      operations:
      - name: listtags
        method: GET
        description: Get a list of tags
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: discourse-tags-rest
    port: 8080
    description: REST adapter for Discourse API Documentation — Tags. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/tag/name-json
      name: tag-name-json
      description: REST surface for tag-name}.json.
      operations:
      - method: GET
        name: gettag
        description: Get a specific tag
        call: discourse-tags.gettag
        with:
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
