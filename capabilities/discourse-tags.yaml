    description: Discourse API Documentation — Tags business capability. Self-contained, no shared references.
    resources:
    - name: tag-name}.json
      path: /tag/{name}.json
      operations:
      - name: gettag
        method: GET
        description: Get a specific tag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
    - name: tag_groups.json
      path: /tag_groups.json
      operations:
      - name: listtaggroups
        method: GET
        description: Get a list of tag groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createtaggroup
        method: POST
        description: Creates a tag group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
    - name: tag_groups-id}.json
      path: /tag_groups/{id}.json
      operations:
      - name: gettaggroup
        method: GET
        description: Get a single tag group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
