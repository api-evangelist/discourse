                        - 'null'
                      default_notification_level:
                        type: integer
                      membership_request_template:
                        type:
                        - string
                        - 'null'
                      members_visibility_level:
                        type: integer
                      can_see_members:
                        type: boolean
                      can_admin_group:
                        type: boolean
                      can_edit_group:
                        type: boolean
                      publish_read_state:
                        type: boolean
