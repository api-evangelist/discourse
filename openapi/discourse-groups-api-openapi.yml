                    usernames:
                      type: string
                      description: comma,separated
                    owner_usernames:
                      type: string
                      description: comma,separated
                    automatic_membership_email_domains:
                      type: string
                      description: pipe|separated
                    visibility_level:
                      type: integer
                    primary_group:
                      type: boolean
                    flair_icon:
                      type: string
