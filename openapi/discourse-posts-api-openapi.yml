  /posts/{id}/locked.json:
    put:
      summary: Lock a post from being edited
      tags:
      - Posts
      operationId: lockPost
      parameters:
      - name: Api-Key
        in: header
        required: true
        schema:
          type: string
      - name: Api-Username
        in: header
        required: true
        schema:
          type: string
      - name: id
        in: path
        schema:
          type: string
        required: true
      responses:
        '200':
          description: post updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  locked:
                    type: boolean
                    description: Whether the post is locked
                required:
                - locked
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                locked:
                  type: string
                  description: Whether to lock the post (true/false)
              required:
              - locked
  /post_actions.json:
    post:
      summary: Like a post and other actions
      tags:
      - Posts
      operationId: performPostAction
      parameters:
      - name: Api-Key
        in: header
        required: true
        schema:
          type: string
      - name: Api-Username
        in: header
        required: true
        schema:
          type: string
      responses:
        '200':
          description: post updated
          content:
            application/json:
              schema:
                additionalProperties: true
                properties:
                  id:
                    type: integer
                    description: The ID of the post
                  name:
                    type: string
                    description: The name of the post author
                  username:
                    type: string
                    description: The username of the post author
                  avatar_template:
                    type: string
                    description: Template for the author's avatar URL
                  created_at:
                    type: string
                    description: When the post was created
                  cooked:
                    type: string
                    description: The HTML content of the post
                  post_number:
                    type: integer
                    description: The post number within the topic
                  post_type:
                    type: integer
                    description: The type of post
                  posts_count:
                    type: integer
                    description: Total posts count for the user
                  updated_at:
                    type: string
                    description: When the post was last updated
                  reply_count:
                    type: integer
                    description: Number of replies to this post
                  reply_to_post_number:
                    type:
                    - string
                    - 'null'
                    description: Post number this post is replying to
                  quote_count:
                    type: integer
                    description: Number of times this post has been quoted
                  incoming_link_count:
                    type: integer
                    description: Number of incoming links to this post
                  reads:
                    type: integer
                    description: Number of reads
                  readers_count:
                    type: integer
                    description: Number of readers
                  score:
                    type: number
                    description: Post score
                  yours:
                    type: boolean
                    description: Whether this post belongs to the current user
                  topic_id:
                    type: integer
                    description: ID of the topic this post belongs to
                  topic_slug:
                    type: string
                    description: Slug of the topic this post belongs to
                  display_username:
                    type: string
                    description: Display username of the post author
                  primary_group_name:
                    type:
                    - string
                    - 'null'
                    description: Primary group name of the author
                  flair_name:
                    type:
                    - string
                    - 'null'
                    description: Flair name of the author
                  flair_url:
                    type:
                    - string
                    - 'null'
                    description: Flair URL of the author
                  flair_bg_color:
                    type:
                    - string
                    - 'null'
                    description: Flair background color of the author
                  flair_color:
                    type:
                    - string
                    - 'null'
                    description: Flair color of the author
                  flair_group_id:
                    type:
                    - integer
                    - 'null'
