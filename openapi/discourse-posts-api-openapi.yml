                  can_delete:
                    type: boolean
                    description: Whether the current user can delete this post
                  can_recover:
                    type: boolean
                    description: Whether the current user can recover this post
                  can_see_hidden_post:
                    type: boolean
                    description: Whether the current user can see hidden posts
                  can_wiki:
                    type: boolean
