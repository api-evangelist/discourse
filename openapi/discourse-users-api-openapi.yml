  /u/{username}/preferences/avatar/pick.json:
    put:
      summary: Update avatar
      tags:
      - Users
      operationId: updateAvatar
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: avatar updated
          content:
            application/json:
              schema:
                additionalProperties: false
                properties:
                  success:
                    type: string
                    example: OK
                required:
                - success
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: false
              properties:
                upload_id:
                  type: integer
                type:
                  type: string
                  enum:
                  - uploaded
                  - custom
                  - gravatar
                  - system
              required:
              - upload_id
              - type
  /u/{username}/preferences/email.json:
    put:
      summary: Update email
      tags:
      - Users
      operationId: updateEmail
      parameters:
      - name: username
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: email updated
      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: false
              properties:
                email:
                  type: string
                  format: email
              required:
              - email
