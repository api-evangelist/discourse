      requestBody:
        content:
          application/json:
            schema:
              additionalProperties: false
              properties:
                new_username:
                  type: string
              required:
              - new_username
  /directory_items.json:
    get:
      summary: Get a public list of users
      tags:
      - Users
      operationId: listUsersPublic
      parameters:
      - name: period
        in: query
        schema:
          type: string
          enum:
          - daily
          - weekly
          - monthly
          - quarterly
          - yearly
          - all
        required: true
      - name: order
