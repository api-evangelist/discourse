          type: string
          enum:
          - likes_received
          - likes_given
          - topic_count
          - post_count
          - topics_entered
          - posts_read
          - days_visited
        required: true
      - name: asc
        in: query
        schema:
          type: string
          enum:
          - 'true'
      - name: page
        in: query
        schema:
          type: integer
