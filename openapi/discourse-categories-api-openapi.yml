  /c/{slug}/{id}.json:
    get:
      summary: List topics
      tags:
      - Categories
      operationId: listCategoryTopics
      parameters:
      - name: slug
        in: path
        schema:
          type: string
        required: true
      - name: id
        in: path
        schema:
          type: integer
        required: true
      responses:
        '200':
          description: success response
          content:
            application/json:
              schema:
                additionalProperties: false
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      properties:
                        id:
                          type: integer
                        username:
                          type: string
                        name:
                          type: string
                        avatar_template:
                          type: string
                      required:
                      - id
                      - username
                      - name
                      - avatar_template
                  primary_groups:
                    type: array
                    items: {}
                  topic_list:
                    type: object
                    additionalProperties: false
                    properties:
                      can_create_topic:
                        type: boolean
                      per_page:
                        type: integer
                      top_tags:
                        type: array
